<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing-ID Tooling</title>

<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --surface3: #2a2f45;
    --border: #2e3349;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --muted2: #64748b;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --danger: #ef4444;
    --danger-hover: #f87171;
    --success: #22c55e;
    --warning: #f59e0b;
    --log-bg: #0a0c12;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  header .badge {
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  aside {
    width: 300px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
  }

  .sidebar-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted2);
    margin-bottom: 8px;
  }

  .sidebar-collapsible {
    flex-shrink: 0;
  }

  .sidebar-collapsible summary {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted2);
    cursor: pointer;
    list-style: none;
  }

  .sidebar-collapsible summary::-webkit-details-marker {
    display: none;
  }

  .sidebar-collapsible summary::before {
    content: '▸';
    display: inline-block;
    width: 12px;
    color: var(--muted2);
    transition: transform 0.15s;
  }

  .sidebar-collapsible[open] summary::before {
    transform: rotate(90deg);
  }

  .sidebar-collapsible[open] summary {
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 10px;
    font-size: 13px;
    font-family: var(--font-mono);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder {
    color: var(--muted2);
  }

  .file-pick-wrap {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .file-pick-wrap input[type="text"] {
    flex: 1;
    min-width: 0;
  }

  .btn-browse {
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    padding: 7px 10px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    line-height: 1;
  }

  .btn-browse:hover {
    background: var(--surface3);
    color: var(--text);
  }

  .btn-clear {
    flex-shrink: 0;
    background: transparent;
    border: none;
    color: var(--muted2);
    padding: 4px 6px;
    font-size: 15px;
    cursor: pointer;
    line-height: 1;
    border-radius: 4px;
    transition: color 0.15s;
  }

  .btn-clear:hover {
    color: var(--text);
  }

  .btn-clear[hidden] {
    display: none;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap input {
    padding-left: 28px;
  }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted2);
    font-size: 15px;
    pointer-events: none;
  }

  .set-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }

  .set-list::-webkit-scrollbar,
  .log-panel::-webkit-scrollbar,
  .report-panel::-webkit-scrollbar {
    width: 6px;
  }

  .set-list::-webkit-scrollbar-track,
  .log-panel::-webkit-scrollbar-track,
  .report-panel::-webkit-scrollbar-track {
    background: transparent;
  }

  .set-list::-webkit-scrollbar-thumb,
  .log-panel::-webkit-scrollbar-thumb,
  .report-panel::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  .set-item {
    padding: 8px 16px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    transition: background 0.1s, color 0.1s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .set-item:hover {
    background: var(--surface2);
    color: var(--text);
  }

  .set-item.active {
    background: var(--surface2);
    color: var(--accent);
    font-weight: 500;
  }

  .set-item .serie {
    font-size: 10px;
    color: var(--muted2);
    display: block;
    margin-top: 2px;
  }

  .set-item.active .serie {
    color: var(--accent);
    opacity: 0.75;
  }

  .empty-state {
    padding: 20px 16px;
    color: var(--muted2);
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .set-label {
    font-size: 13px;
    font-family: var(--font-mono);
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .set-label.placeholder {
    color: var(--muted2);
    font-family: inherit;
  }

  button {
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-dry-run {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-dry-run:hover:not(:disabled) {
    background: var(--surface3);
  }

  .btn-apply {
    background: var(--danger);
    color: #fff;
  }

  .btn-apply:hover:not(:disabled) {
    background: var(--danger-hover);
  }

  .btn-fill {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-fill:hover:not(:disabled) {
    background: var(--surface3);
  }

  .stale-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.35);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--warning);
    font-family: var(--font-mono);
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .log-panel {
    height: 26%;
    min-height: 150px;
    background: var(--log-bg);
    font-family: var(--font-mono);
    font-size: 12.5px;
    line-height: 1.7;
    padding: 14px 18px;
    overflow-y: auto;
    color: #94a3b8;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .log-line {
    display: block;
  }

  .log-line.error {
    color: var(--danger);
  }

  .log-line.success {
    color: var(--success);
  }

  .log-placeholder {
    color: var(--muted2);
    font-family: inherit;
  }

  .report-panel {
    flex: 1;
    background: var(--surface);
    overflow-y: auto;
  }

  .report-panel:empty {
    display: none;
  }

  .report-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted2);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 2;
  }

  .report-title {
    font-weight: 400;
    color: var(--text);
    text-transform: none;
    letter-spacing: 0;
    font-family: var(--font-mono);
  }

  .report-time {
    margin-left: auto;
    font-weight: 400;
    color: var(--muted);
    text-transform: none;
    letter-spacing: 0;
  }

  .mapping-editor {
    margin-top: 10px;
    border: 1px solid var(--border);
    background: rgba(15,17,23,0.55);
    border-radius: 8px;
    overflow: hidden;
  }

  .mapping-editor + .product-list {
    margin-top: 10px;
  }

  .mapping-editor-header {
    padding: 8px 10px;
    background: var(--surface3);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .mapping-row {
    display: grid;
    grid-template-columns: 110px 1fr 130px 120px 140px 120px 1fr 96px 96px;
    gap: 8px;
    align-items: center;
    padding: 8px 10px;
    border-top: 1px solid var(--border);
  }

  .mapping-row:first-of-type {
    border-top: none;
  }

  .mapping-row input,
  .mapping-row select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 6px 8px;
    font-size: 12px;
    outline: none;
  }

  .mapping-row input:focus,
  .mapping-row select:focus {
    border-color: var(--accent);
  }

  .mapping-product-id {
    font-family: var(--font-mono);
    color: var(--text);
    font-size: 12px;
  }

  .mapping-product-meta {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.4;
  }

  .mapping-product-meta small {
    display: block;
    color: var(--muted2);
    font-family: var(--font-mono);
    margin-top: 2px;
  }

  .btn-save-map {
    background: var(--accent);
    color: white;
    justify-content: center;
    padding: 6px 10px;
    font-size: 12px;
  }

  .btn-save-map:hover:not(:disabled) {
    background: var(--accent-hover);
  }

  .btn-clear-map {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    justify-content: center;
    padding: 6px 10px;
    font-size: 12px;
  }

  .btn-clear-map:hover:not(:disabled) {
    background: var(--surface3);
    color: var(--text);
  }

  .mapping-status {
    font-size: 11px;
    color: var(--muted2);
    margin-top: 6px;
  }

  .mapping-status.ok {
    color: var(--success);
  }

  .mapping-status.error {
    color: var(--danger);
  }

  .base-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    margin-top: 4px;
  }

  .base-badge.is-base {
    background: rgba(99,102,241,0.15);
    border-color: rgba(99,102,241,0.4);
    color: var(--accent);
  }

  .base-badge.is-base:hover {
    background: rgba(239,68,68,0.1);
    border-color: rgba(239,68,68,0.35);
    color: var(--danger);
    content: 'Reset';
  }

  .base-badge.not-base {
    background: var(--surface3);
    border-color: var(--border);
    color: var(--muted2);
  }

  .base-badge.not-base:hover {
    background: rgba(99,102,241,0.1);
    border-color: rgba(99,102,241,0.35);
    color: var(--accent);
  }

  @media (max-width: 1200px) {
    .mapping-row {
      grid-template-columns: 1fr;
    }
  }

  .summary-chips {
    display: flex;
    gap: 8px;
    padding: 12px 18px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }

  .chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--muted);
  }

  .chip .chip-val {
    font-weight: 700;
    font-family: var(--font-mono);
    color: var(--text);
  }

  .chip.matched .chip-val { color: var(--success); }
  .chip.ambiguous .chip-val { color: var(--warning); }
  .chip.unmatched .chip-val { color: var(--danger); }
  .chip.review .chip-val { color: var(--warning); }
  .chip.written .chip-val { color: var(--accent); }
  .chip.orphan .chip-val { color: var(--muted); }

  .report-section {
    padding: 0 18px 20px;
  }

  .report-section h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted2);
    margin: 18px 0 10px;
  }

  details {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  details[open] {
    background: #1c2133;
  }

  summary {
    cursor: pointer;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    list-style: none;
  }

  summary::-webkit-details-marker {
    display: none;
  }

  summary::before {
    content: '▸';
    color: var(--muted2);
    transition: transform 0.15s;
  }

  details[open] summary::before {
    transform: rotate(90deg);
  }

  .card-title {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-meta {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--muted2);
    font-size: 11px;
    flex-shrink: 0;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    padding: 2px 7px;
    font-size: 10px;
    line-height: 1.4;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .tag.ok {
    color: var(--success);
    border-color: rgba(34,197,94,0.35);
    background: rgba(34,197,94,0.08);
  }

  .tag.review,
  .tag.warning {
    color: var(--warning);
    border-color: rgba(245,158,11,0.35);
    background: rgba(245,158,11,0.08);
  }

  .tag.danger {
    color: var(--danger);
    border-color: rgba(239,68,68,0.35);
    background: rgba(239,68,68,0.08);
  }

  .details-body {
    padding: 0 12px 12px 34px;
  }

  .product-list {
    display: grid;
    gap: 10px;
  }

  .product-card {
    border: 1px solid var(--border);
    background: rgba(15,17,23,0.55);
    border-radius: 8px;
    padding: 10px;
  }

  .product-head {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }

  .product-name {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
  }

  .product-number {
    color: var(--muted2);
    font-family: var(--font-mono);
    font-size: 11px;
  }

  .id-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }

  .id-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 7px;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .id-pill strong {
    color: var(--text);
    font-weight: 600;
  }

  .variant-line {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .sku-table-wrap {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: auto;
    max-height: 280px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  th {
    text-align: left;
    padding: 6px 8px;
    background: var(--surface3);
    color: var(--muted);
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  td {
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    vertical-align: top;
  }

  tr:last-child td {
    border-bottom: none;
  }

  tr:hover td {
    background: rgba(255,255,255,0.03);
  }

  .muted {
    color: var(--muted2);
  }

  .small {
    font-size: 11px;
  }

  /* Variant diff table */
  .variant-diff {
    margin-bottom: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .variant-diff-title {
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--muted2);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .variant-diff-row {
    display: grid;
    grid-template-columns: 14px 1fr auto;
    align-items: center;
    gap: 8px;
    padding: 5px 10px;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
  }

  .variant-diff-row:last-child { border-bottom: none; }

  .variant-diff-row.action-add    { background: rgba(34,197,94,.07); }
  .variant-diff-row.action-update { background: rgba(59,130,246,.07); }
  .variant-diff-row.action-noop   { opacity: .55; }

  .vd-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .action-add    .vd-dot { background: var(--success); }
  .action-update .vd-dot { background: #3b82f6; }
  .action-noop   .vd-dot { background: var(--muted2); }

  .vd-key { font-family: monospace; color: var(--text); }

  .vd-ids { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }

  .vd-id {
    font-size: 11px;
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid var(--border);
    color: var(--muted2);
    white-space: nowrap;
  }

  .vd-id.new {
    color: var(--text);
    border-color: rgba(59,130,246,.4);
    background: rgba(59,130,246,.08);
  }

  .inline-warning {
    color: var(--warning);
    font-size: 12px;
    margin: 8px 0;
  }

  .catalog-link-queue {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 8px;
    max-height: 220px;
    overflow-y: auto;
  }

  .catalog-link-empty {
    color: var(--muted2);
    font-size: 12px;
    padding: 6px 0;
  }

  .catalog-link-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
  }

  .catalog-link-item-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .catalog-link-item-name {
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }

  .catalog-link-status {
    flex-shrink: 0;
    font-size: 11px;
    font-family: var(--font-mono);
    padding: 2px 7px;
    border-radius: 10px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .catalog-link-status.pending { color: var(--muted2); }
  .catalog-link-status.running { color: var(--accent-hover); border-color: var(--accent); }
  .catalog-link-status.done { color: var(--success); border-color: rgba(34,197,94,.4); }
  .catalog-link-status.error { color: var(--danger); border-color: rgba(239,68,68,.4); }

  .catalog-link-item-detail {
    color: var(--muted2);
    font-size: 11px;
    line-height: 1.4;
  }

  .catalog-link-item-actions {
    display: flex;
    gap: 6px;
    margin-top: 2px;
  }

  .btn-catalog-link-use, .btn-catalog-link-remove {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 8px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }

  .btn-catalog-link-use:hover, .btn-catalog-link-remove:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .catalog-link-actions {
    display: flex;
    gap: 6px;
  }

  .catalog-link-actions .btn-browse,
  .catalog-link-actions .btn-dry-run {
    flex: 1;
    justify-content: center;
    font-size: 12px;
    padding: 6px 8px;
  }

  .id-map-hint {
    margin: 10px 0 6px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .id-map-options {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .btn-id-map-entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 10px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    font-size: 12px;
    transition: border-color .15s;
  }

  .btn-id-map-entry:hover {
    border-color: var(--accent);
  }

  .btn-id-map-entry code {
    font-family: var(--font-mono);
    color: var(--accent-hover);
  }

  .btn-id-map-entry .copy-label {
    font-size: 11px;
    color: var(--accent);
    flex-shrink: 0;
  }

  .btn-id-map-entry .copy-label.error {
    color: var(--danger);
  }

  .id-map-manual {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }

  .id-map-manual-key {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent-hover);
    flex-shrink: 0;
  }

  .id-map-manual-input {
    flex: 1;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    min-width: 0;
  }

  .id-map-manual-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .btn-id-map-copy-manual {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    color: var(--muted2);
    cursor: pointer;
    font-size: 11px;
    flex-shrink: 0;
    transition: border-color .15s, color .15s;
  }

  .btn-id-map-copy-manual:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .filter-bar label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted2);
    margin-right: 4px;
  }

  .filter-btn {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
  }

  .filter-btn:hover {
    background: var(--surface3);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .cm-preset {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    padding: 6px 8px;
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }

  .cm-preset:focus {
    border-color: var(--accent);
  }
</style>
</head>

<body>
<header>
  <h1>Pricing-ID Tooling</h1>
  <span class="badge" id="mode-badge">idle</span>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-section">
      <label>Repo path</label>
      <input type="text" id="repo-input" placeholder="H:/cards-database" spellcheck="false">
    </div>

    <div class="sidebar-section">
      <label>CardMarket merge JSON</label>
      <div class="file-pick-wrap">
        <input type="text" id="cardmarket-json-input" placeholder="No file chosen" spellcheck="false" readonly>
        <button class="btn-clear" type="button" id="cardmarket-json-clear" title="Clear" hidden>&#xD7;</button>
        <button class="btn-browse" type="button" title="Choose file" onclick="document.getElementById('cardmarket-json-file').click()">&#128193;</button>
        <input type="file" id="cardmarket-json-file" accept=".json" style="display:none">
      </div>
    </div>

    <div class="sidebar-section">
      <label>CardMarket manual map</label>
      <div class="file-pick-wrap">
        <input type="text" id="cardmarket-map-input" placeholder="Auto (beside merge JSON)" spellcheck="false" readonly>
        <button class="btn-clear" type="button" id="cardmarket-map-clear" title="Clear" hidden>&#xD7;</button>
        <button class="btn-browse" type="button" title="Choose file" onclick="document.getElementById('cardmarket-map-file').click()">&#128193;</button>
        <input type="file" id="cardmarket-map-file" accept=".json" style="display:none">
      </div>
    </div>

    <div class="sidebar-section">
      <label>TCGPlayer set JSON / CSV <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted2)">(optional)</span></label>
      <div class="file-pick-wrap">
        <input type="text" id="tcgplayer-json-input" placeholder="No file chosen" spellcheck="false" readonly>
        <button class="btn-clear" type="button" id="tcgplayer-json-clear" title="Clear" hidden>&#xD7;</button>
        <button class="btn-browse" type="button" title="Choose file" onclick="document.getElementById('tcgplayer-json-file').click()">&#128193;</button>
        <input type="file" id="tcgplayer-json-file" accept=".json,.csv" style="display:none">
      </div>
    </div>

    <div class="sidebar-section">
      <label>TCGPlayer set ID <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted2)">(override)</span></label>
      <input type="number" id="tcgplayer-set-id-input" placeholder="e.g. 24655" spellcheck="false" min="1" step="1">
    </div>

    <div class="sidebar-section">
      <label>TCGPlayer ID overrides <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted2)">(JSON, optional)</span></label>
      <div class="file-pick-wrap">
        <input type="text" id="tcgplayer-id-map-input" placeholder="No file chosen" spellcheck="false" readonly>
        <button class="btn-clear" type="button" id="tcgplayer-id-map-clear" title="Clear" hidden>&#xD7;</button>
        <button class="btn-browse" type="button" title="Choose file" onclick="document.getElementById('tcgplayer-id-map-file').click()">&#128193;</button>
        <input type="file" id="tcgplayer-id-map-file" accept=".json" style="display:none">
      </div>
    </div>

    <details class="sidebar-section sidebar-collapsible">
      <summary>CardMarket catalog linker <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted2)">(no scraping)</span></summary>
      <div class="catalog-link-queue" id="catalog-link-queue">
        <div class="catalog-link-empty">No sets queued.</div>
      </div>
      <div class="catalog-link-actions">
        <button class="btn-browse" type="button" id="btn-add-current-set" title="Add the currently selected set to the queue">+ Add current set</button>
        <button class="btn-browse" type="button" id="btn-import-sets-json" title="Import a sets.json (matches by set name against the loaded Sets list)">&#128193; Import sets.json</button>
        <button class="btn-dry-run" type="button" id="btn-run-catalog-queue" disabled>▷ Run queue</button>
      </div>
      <input type="file" id="catalog-link-import-file" accept=".json" style="display:none">
    </details>

    <div class="sidebar-section">
      <label>Sets</label>
      <div class="search-wrap">
        <input type="text" id="set-search" placeholder="Search sets…" spellcheck="false">
      </div>
    </div>

    <div class="set-list" id="set-list">
      <div class="empty-state">Enter a repo path<br>to load sets</div>
    </div>
  </aside>

  <main>
    <div class="toolbar">
      <span class="set-label placeholder" id="selected-label">No set selected</span>
      <span class="stale-badge" id="stale-badge" style="display:none">↻ Mappings changed — run dry-run to refresh counts</span>
      <button class="btn-fill" id="btn-fill" disabled title="Only adds missing cardtrader IDs to existing detailed variants. Never rewrites variant shape.">↓ Fill CardTrader</button>
      <button class="btn-dry-run" id="btn-dry" disabled>▷ Dry run</button>
      <button class="btn-apply" id="btn-apply" disabled>⚡ Apply</button>
    </div>

    <div class="content">
      <div class="log-panel" id="log-panel">
        <span class="log-placeholder">Select a set and run a dry-run to preview changes.</span>
      </div>

      <div class="report-panel" id="report-panel"></div>
    </div>
  </main>
</div>

<script>
  const repoInput = document.getElementById('repo-input')
  const setSearch = document.getElementById('set-search')
  const setList = document.getElementById('set-list')
  const selectedLabel = document.getElementById('selected-label')
  const btnFill = document.getElementById('btn-fill')
  const btnDry = document.getElementById('btn-dry')
  const btnApply = document.getElementById('btn-apply')
  const logPanel = document.getElementById('log-panel')
  const reportPanel = document.getElementById('report-panel')
  const modeBadge = document.getElementById('mode-badge')
  const staleBadge = document.getElementById('stale-badge')

  let allSets = []
  let selectedSet = null
  let running = false
  let currentReportBlocksApply = false
  let mappingsChangedSinceLastRun = false

  const savedRepo = localStorage.getItem('repo') ?? ''

  if (savedRepo) {
    repoInput.value = savedRepo
    loadSets(savedRepo)
  }

  function bindFilePicker(inputId, fileId, clearId, storageKey) {
    const inputEl = document.getElementById(inputId)
    const fileEl = document.getElementById(fileId)
    const clearEl = document.getElementById(clearId)

    const saved = localStorage.getItem(storageKey) ?? ''
    if (saved) {
      inputEl.value = saved
      clearEl.hidden = false
    }

    async function upload(file) {
      const form = new FormData()
      form.append('file', file)
      try {
        const res = await fetch('/api/upload', { method: 'POST', body: form })
        if (!res.ok) throw new Error(await res.text())
        const { path } = await res.json()
        inputEl.value = path
        localStorage.setItem(storageKey, path)
        clearEl.hidden = false
      } catch (err) {
        alert(`Upload failed: ${err.message}`)
      }
    }

    fileEl.addEventListener('change', function() {
      if (this.files[0]) upload(this.files[0])
    })

    clearEl.addEventListener('click', () => {
      inputEl.value = ''
      fileEl.value = ''
      localStorage.removeItem(storageKey)
      clearEl.hidden = true
    })

    return inputEl
  }

  const cardmarketJsonInput = bindFilePicker('cardmarket-json-input', 'cardmarket-json-file', 'cardmarket-json-clear', 'cardmarketJson')
  const cardmarketMapInput = bindFilePicker('cardmarket-map-input', 'cardmarket-map-file', 'cardmarket-map-clear', 'cardmarketMap')
  const tcgplayerJsonInput = bindFilePicker('tcgplayer-json-input', 'tcgplayer-json-file', 'tcgplayer-json-clear', 'tcgplayerJson')
  const tcgplayerIdMapInput = bindFilePicker('tcgplayer-id-map-input', 'tcgplayer-id-map-file', 'tcgplayer-id-map-clear', 'tcgplayerIdMap')

  // ---------------------------------------------------------------------------
  // CardMarket catalog linker queue
  // ---------------------------------------------------------------------------

  let catalogLinkQueue = []
  try {
    catalogLinkQueue = JSON.parse(localStorage.getItem('catalogLinkQueue') || '[]')
  } catch {
    catalogLinkQueue = []
  }

  const catalogQueueEl = document.getElementById('catalog-link-queue')
  const btnAddCurrentSet = document.getElementById('btn-add-current-set')
  const btnRunCatalogQueue = document.getElementById('btn-run-catalog-queue')

  function saveCatalogLinkQueue() {
    localStorage.setItem('catalogLinkQueue', JSON.stringify(catalogLinkQueue))
  }

  function renderCatalogLinkQueue() {
    if (catalogLinkQueue.length === 0) {
      catalogQueueEl.innerHTML = '<div class="catalog-link-empty">No sets queued.</div>'
      btnRunCatalogQueue.disabled = true
      return
    }

    btnRunCatalogQueue.disabled = catalogLinkQueue.some((item) => item.status === 'running')

    catalogQueueEl.innerHTML = catalogLinkQueue.map((item, index) => {
      const status = item.status || 'pending'
      let detail = ''

      if (status === 'done' && item.result) {
        detail = `Matched ${item.result.matchedCount}/${item.result.totalCards} cards${item.result.unmatched?.length ? ` (${item.result.unmatched.length} unmatched)` : ''}`
      } else if (status === 'error') {
        detail = escapeHtml(item.error || 'Failed')
      }

      return `
        <div class="catalog-link-item">
          <div class="catalog-link-item-row">
            <span class="catalog-link-item-name">${escapeHtml(item.set)}</span>
            <span class="catalog-link-status ${status}">${status}</span>
          </div>
          ${detail ? `<div class="catalog-link-item-detail">${detail}</div>` : ''}
          <div class="catalog-link-item-actions">
            ${status === 'done' ? `<button class="btn-catalog-link-use" type="button" onclick="useCatalogLinkResult(${index})">Use this JSON</button>` : ''}
            <button class="btn-catalog-link-remove" type="button" onclick="removeCatalogLinkItem(${index})">Remove</button>
          </div>
        </div>
      `
    }).join('')
  }

  function addCatalogLinkSet(set) {
    if (catalogLinkQueue.some((item) => item.set === set)) return
    catalogLinkQueue.push({ set, status: 'pending' })
    saveCatalogLinkQueue()
    renderCatalogLinkQueue()
  }

  function removeCatalogLinkItem(index) {
    catalogLinkQueue.splice(index, 1)
    saveCatalogLinkQueue()
    renderCatalogLinkQueue()
  }

  function useCatalogLinkResult(index) {
    const item = catalogLinkQueue[index]
    if (!item || item.status !== 'done' || !item.result?.destPath) return
    cardmarketJsonInput.value = item.result.destPath
    localStorage.setItem('cardmarketJson', item.result.destPath)
    document.getElementById('cardmarket-json-clear').hidden = false
  }

  async function runCatalogLinkQueue() {
    const repo = repoInput.value.trim()
    if (!repo) {
      alert('Enter a repo path first.')
      return
    }

    btnRunCatalogQueue.disabled = true

    for (let i = 0; i < catalogLinkQueue.length; i++) {
      const item = catalogLinkQueue[i]
      if (item.status === 'done') continue

      item.status = 'running'
      delete item.error
      saveCatalogLinkQueue()
      renderCatalogLinkQueue()

      try {
        const res = await fetch('/api/cardmarket-catalog-link', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ repo, set: item.set }),
        })

        const data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Request failed')

        item.status = 'done'
        item.result = data
      } catch (err) {
        item.status = 'error'
        item.error = err instanceof Error ? err.message : String(err)
      }

      saveCatalogLinkQueue()
      renderCatalogLinkQueue()
    }

    btnRunCatalogQueue.disabled = catalogLinkQueue.length === 0
  }

  btnAddCurrentSet.addEventListener('click', () => {
    if (!selectedSet) {
      alert('Select a set first.')
      return
    }
    addCatalogLinkSet(selectedSet)
  })

  btnRunCatalogQueue.addEventListener('click', () => {
    runCatalogLinkQueue()
  })

  function normaliseForSetMatch(value) {
    return String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '')
  }

  function findSetPathByName(name) {
    const target = normaliseForSetMatch(name)
    if (!target) return null

    return allSets.find((setPath) => {
      const lastSegment = setPath.split('/').at(-1)
      return normaliseForSetMatch(lastSegment) === target
    }) ?? null
  }

  const btnImportSetsJson = document.getElementById('btn-import-sets-json')
  const catalogLinkImportFile = document.getElementById('catalog-link-import-file')

  btnImportSetsJson.addEventListener('click', () => {
    if (allSets.length === 0) {
      alert('Load a repo and its sets first (use the Repo field above).')
      return
    }
    catalogLinkImportFile.click()
  })

  catalogLinkImportFile.addEventListener('change', async function () {
    const file = this.files[0]
    if (!file) return

    try {
      const text = await file.text()
      const parsed = JSON.parse(text)

      if (!Array.isArray(parsed)) {
        throw new Error('Expected a JSON array (either ["Set Name", ...] or [{ "name": "...", "urls": [...] }, ...]).')
      }

      const names = parsed.map((entry) => (typeof entry === 'string' ? entry : entry?.name)).filter(Boolean)

      let added = 0
      const unmatched = []

      for (const name of names) {
        const setPath = findSetPathByName(name)
        if (!setPath) {
          unmatched.push(name)
          continue
        }
        if (!catalogLinkQueue.some((item) => item.set === setPath)) {
          catalogLinkQueue.push({ set: setPath, status: 'pending' })
          added++
        }
      }

      saveCatalogLinkQueue()
      renderCatalogLinkQueue()

      let msg = `Added ${added} set(s) to the queue from ${file.name}.`
      if (unmatched.length > 0) {
        msg += `\n\nCould not match ${unmatched.length} name(s) against the loaded Sets list:\n${unmatched.join(', ')}`
      }
      alert(msg)
    } catch (err) {
      alert(`Failed to import ${file.name}: ${err instanceof Error ? err.message : String(err)}`)
    } finally {
      this.value = ''
    }
  })

  renderCatalogLinkQueue()

  let repoTimer

  repoInput.addEventListener('input', () => {
    clearTimeout(repoTimer)

    repoTimer = setTimeout(() => {
      const repo = repoInput.value.trim()

      localStorage.setItem('repo', repo)
      selectedSet = null
      currentReportBlocksApply = false
      selectedLabel.textContent = 'No set selected'
      selectedLabel.classList.add('placeholder')
      btnFill.disabled = true
      btnDry.disabled = true
      btnApply.disabled = true
      btnApply.title = ''
      reportPanel.innerHTML = ''

      loadSets(repo)
    }, 600)
  })

  setSearch.addEventListener('input', () => {
    renderSetList(setSearch.value.trim().toLowerCase())
  })

  btnFill.addEventListener('click', () => {
    if (!selectedSet || running) return

    const apply = confirm(
      `Fill missing CardTrader IDs for "${selectedSet}"?\n\n` +
      'OK — Apply changes now (safe: never rewrites variant shape)\n' +
      'Cancel — Preview only (dry-run)'
    )

    run(apply, true)
  })

  btnDry.addEventListener('click', () => run(false))

  btnApply.addEventListener('click', () => {
    if (!selectedSet) return

    if (currentReportBlocksApply) {
      alert('Apply is blocked until all required CardMarket mappings are completed.')
      return
    }

    const confirmed = confirm(
      `Apply changes to "${selectedSet}"?\n\n` +
      'This will rewrite card files. Make sure you have reviewed the dry-run report first.'
    )

    if (!confirmed) return

    run(true)
  })

  async function loadSets(repo) {
    if (!repo) {
      allSets = []
      setList.innerHTML = '<div class="empty-state">Enter a repo path<br>to load sets</div>'
      return
    }

    setList.innerHTML = '<div class="empty-state">Loading…</div>'

    try {
      const res = await fetch(`/api/sets?repo=${encodeURIComponent(repo)}`)
      const data = await res.json()

      allSets = data.sets ?? []
      renderSetList(setSearch.value.trim().toLowerCase())
    } catch {
      setList.innerHTML = '<div class="empty-state">Could not load sets.<br>Check repo path.</div>'
    }
  }

  function renderSetList(filter) {
    const filtered = filter
      ? allSets.filter((set) => set.toLowerCase().includes(filter))
      : allSets

    if (!filtered.length) {
      setList.innerHTML = '<div class="empty-state">No sets found</div>'
      return
    }

    setList.innerHTML = filtered.map((set) => {
      const parts = set.split('/')
      const name = parts.at(-1)
      const serie = parts.slice(0, -1).join('/')
      const active = set === selectedSet ? 'active' : ''

      return `
        <div class="set-item ${active}" data-set="${escapeAttr(set)}">
          <span>${escapeHtml(name)}</span>
          <span class="serie">${escapeHtml(serie)}</span>
        </div>
      `
    }).join('')

    setList.querySelectorAll('.set-item').forEach((el) => {
      el.addEventListener('click', () => selectSet(el.dataset.set))
    })
  }

  function selectSet(set) {
    selectedSet = set
    currentReportBlocksApply = false
    selectedLabel.textContent = set
    selectedLabel.classList.remove('placeholder')
    btnFill.disabled = running
    btnDry.disabled = running
    btnApply.disabled = running
    btnApply.title = ''
    reportPanel.innerHTML = ''
    logPanel.innerHTML = '<span class="log-placeholder">Ready. Press Dry run to preview changes.</span>'

    renderSetList(setSearch.value.trim().toLowerCase())

    fetch(`/api/report?set=${encodeURIComponent(set)}`)
      .then((res) => res.ok ? res.json() : null)
      .then((report) => {
        if (report) renderReport(report)
      })
      .catch(() => {})
  }

  async function run(apply, fillMissingCardtrader = false) {
    if (!selectedSet || running) return

    if (apply && currentReportBlocksApply && !fillMissingCardtrader) {
      alert('Apply is blocked until all required CardMarket mappings are completed.')
      return
    }

    const repo = repoInput.value.trim()

    if (!repo) return

    running = true
    btnFill.disabled = true
    btnDry.disabled = true
    btnApply.disabled = true
    mappingsChangedSinceLastRun = false
    staleBadge.style.display = 'none'

    const modeLabel = fillMissingCardtrader
      ? (apply ? 'fill-applying…' : 'fill-preview…')
      : (apply ? 'applying…' : 'dry-run…')

    modeBadge.textContent = modeLabel
    logPanel.innerHTML = ''
    reportPanel.innerHTML = ''

    try {
      const res = await fetch('/api/run', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          repo,
          set: selectedSet,
          apply,
          cardmarketJson: cardmarketJsonInput.value.trim() || undefined,
          cardmarketMap: cardmarketMapInput.value.trim() || undefined,
          fillMissingCardtrader: fillMissingCardtrader || undefined,
          tcgplayerSetId: parseInt(document.getElementById('tcgplayer-set-id-input').value) || undefined,
          tcgplayerJson: tcgplayerJsonInput.value.trim() || undefined,
          tcgplayerIdMap: tcgplayerIdMapInput.value.trim() || undefined,
        }),
      })

      if (!res.body) {
        appendLog('No response body returned from server.', true)
        return
      }

      const reader = res.body.getReader()
      const decoder = new TextDecoder()
      let buffer = ''

      while (true) {
        const { done, value } = await reader.read()

        if (done) break

        buffer += decoder.decode(value, { stream: true })

        const chunks = buffer.split('\n\n')
        buffer = chunks.pop() ?? ''

        for (const chunk of chunks) {
          if (!chunk.startsWith('data: ')) continue

          try {
            const msg = JSON.parse(chunk.slice(6))

            if (msg.type === 'log') appendLog(msg.line)
            if (msg.type === 'done') renderReport(msg.report)
            if (msg.type === 'error') appendLog(msg.message, true)
          } catch {
            // Ignore malformed SSE chunks.
          }
        }
      }
    } catch (error) {
      appendLog(error instanceof Error ? error.message : String(error), true)
    } finally {
      running = false
      btnFill.disabled = !selectedSet
      btnDry.disabled = !selectedSet
      btnApply.disabled = !selectedSet || currentReportBlocksApply
      modeBadge.textContent = 'idle'
    }
  }

  function appendLog(line, isError = false) {
    const el = document.createElement('span')

    el.className = 'log-line' + (isError ? ' error' : '')
    el.textContent = line

    logPanel.appendChild(el)
    logPanel.appendChild(document.createTextNode('\n'))
    logPanel.scrollTop = logPanel.scrollHeight
  }

  function renderReport(report) {
    const summary = report.summary ?? {}
    const mode = report.mode === 'apply' ? '⚡ Applied' : '▷ Dry run'

    const matchedCount = report.matched?.length ?? 0
    const ambiguousCount = report.ambiguous?.length ?? 0
    const unmatchedCount = report.unmatched?.length ?? 0
    const orphanCount = report.orphanProducts?.length ?? 0
    const skuCount = countReportSkus(report)

    const hasBlockingCardmarketMappings =
      (summary.cardmarketUnmappedProducts ?? 0) > 0

    currentReportBlocksApply = hasBlockingCardmarketMappings

    let html = `
      <div class="report-header">
        <span>Report</span>
        <span class="report-title">${escapeHtml(report.set)}</span>
        <span class="report-time">${escapeHtml(mode)} · ${escapeHtml(new Date(report.createdAt).toLocaleString())}</span>
      </div>

      <div class="summary-chips">
        <div class="chip matched"><span class="chip-val">${matchedCount}</span> matched</div>
        <div class="chip ambiguous"><span class="chip-val">${ambiguousCount}</span> ambiguous</div>
        <div class="chip unmatched"><span class="chip-val">${unmatchedCount}</span> unmatched</div>
        <div class="chip orphan"><span class="chip-val">${orphanCount}</span> orphan products</div>
        <div class="chip review"><span class="chip-val">${summary.reviewRequired ?? 0}</span> review required</div>
        <div class="chip"><span class="chip-val">${skuCount}</span> SKU rows</div>

        ${summary.cardmarketCardsWithReview > 0 ? `
          <div class="chip"><span class="chip-val">${summary.cardmarketCardsWithReview}</span> CM cards</div>
          <div class="chip matched"><span class="chip-val">${summary.cardmarketMappedProducts ?? 0}</span> CM mapped</div>
          <div class="chip review"><span class="chip-val">${summary.cardmarketUnmappedProducts ?? 0}</span> CM unmapped</div>
        ` : ''}

        ${summary.written > 0 ? `<div class="chip written"><span class="chip-val">${summary.written}</span> written</div>` : ''}
      </div>

      ${hasBlockingCardmarketMappings ? `
        <div class="summary-chips">
          <div class="chip unmatched">
            <span class="chip-val">Blocked</span>
            Apply is disabled until ${summary.cardmarketUnmappedProducts} required CardMarket mapping${summary.cardmarketUnmappedProducts === 1 ? '' : 's'} are completed.
          </div>
        </div>
      ` : ''}

      ${report.cardmarket ? `
        <div class="summary-chips">
          <div class="chip"><span class="chip-val">${escapeHtml(report.cardmarket.mergedKeys)}</span> CM merged keys</div>
          <div class="chip"><span class="chip-val">${escapeHtml(report.cardmarket.baseOnly)}</span> base only</div>
          <div class="chip review"><span class="chip-val">${escapeHtml(report.cardmarket.both)}</span> base + additional</div>
          <div class="chip"><span class="chip-val">${escapeHtml(report.cardmarket.addOnly)}</span> add only</div>
        </div>
      ` : ''}

      <div class="report-section">
    `

    const hasCardmarketRows = (report.matched ?? []).some((m) => m.cardmarketReview?.products?.length)

    if (hasCardmarketRows) {
      html += `
        <div class="filter-bar">
          <label>Filter:</label>
          <button class="filter-btn active" onclick="setCardFilter('all', this)">All cards</button>
          <button class="filter-btn" onclick="setCardFilter('needs-mapping', this)">Needs CM mapping</button>
        </div>
      `
    }

    if (report.matched?.length) {
      html += `<h3>Matched cards</h3>`

      for (const match of report.matched) {
        html += renderMatchedCard(match)
      }
    }

    if (report.ambiguous?.length) {
      html += `<h3>Ambiguous cards - not written</h3>`

      for (const item of report.ambiguous) {
        html += renderAmbiguousCard(item)
      }
    }

    if (report.unmatched?.length) {
      html += `<h3>Unmatched cards</h3>`

      for (const item of report.unmatched) {
        html += renderUnmatchedCard(item)
      }
    }

    if (report.orphanProducts?.length) {
      html += `<h3>Orphan products</h3>`

      for (const item of report.orphanProducts) {
        html += renderOrphanProduct(item)
      }
    }

    html += '</div>'

    reportPanel.innerHTML = html
    reportPanel.scrollTop = 0

    btnApply.disabled = running || hasBlockingCardmarketMappings

    if (hasBlockingCardmarketMappings) {

  function renderVariantDiff(changes) {
    if (!changes || changes.length === 0) return ''

    const addCount    = changes.filter(c => c.action === 'add').length
    const updateCount = changes.filter(c => c.action === 'update').length
    const noopCount   = changes.filter(c => c.action === 'noop').length

    const summaryParts = []
    if (addCount)    summaryParts.push(`+${addCount} new`)
    if (updateCount) summaryParts.push(`~${updateCount} update`)
    if (noopCount)   summaryParts.push(`${noopCount} complete`)

    const rows = changes.map(c => {
      const TP_ORDER = ['cardmarket', 'tcgplayer', 'cardtrader']
      const sortedIds = Object.entries(c.idsNew).sort(([a], [b]) => {
        return (TP_ORDER.indexOf(a) + 1 || 99) - (TP_ORDER.indexOf(b) + 1 || 99)
      })

      const idTags = sortedIds.map(([k, v]) => {
        const isNew = c.idsAdded[k] !== undefined
        return `<span class="vd-id${isNew ? ' new' : ''}">${escapeHtml(k)}: ${v}</span>`
      }).join('')

      return `
        <div class="variant-diff-row action-${c.action}">
          <span class="vd-dot"></span>
          <span class="vd-key">${escapeHtml(c.key)}</span>
          <span class="vd-ids">${idTags}</span>
        </div>`
    }).join('')

    return `
      <div class="variant-diff">
        <div class="variant-diff-title">Variants · ${summaryParts.join(' · ')}</div>
        ${rows}
      </div>`
  }

  function renderMatchedCard(match) {

    const needsCardmarketMapping = Boolean(match.cardmarketReview?.needsMapping)

    const changes = match.variantChanges ?? []
    const addCount    = changes.filter(c => c.action === 'add').length
    const updateCount = changes.filter(c => c.action === 'update').length

    const reviewTag = needsCardmarketMapping
      ? '<span class="tag danger">needs CM mapping</span>'

    const diffTag = addCount || updateCount
      ? `<span class="tag" style="color:#3b82f6;border-color:rgba(59,130,246,.35)">

         </span>`
      : changes.length > 0
        ? '<span class="tag" style="color:var(--muted2)">complete</span>'
        : ''

    return `

        <summary>

          <span class="card-meta">
            ${reviewTag}

  async function saveCardmarketMapping(button) {
    const row = button.closest('.mapping-row')
    const status = row.querySelector('[data-status]')

    const cardmarketJson = cardmarketJsonInput.value.trim()
    const cardmarketMap = cardmarketMapInput.value.trim()
    const cardId = row.dataset.cardId
    const productId = Number(row.dataset.productId)
    const type = row.querySelector('.cm-type').value
    const foil = row.querySelector('.cm-foil').value
    const size = row.querySelector('.cm-size').value
    const stampsRaw = row.querySelector('.cm-stamps').value

    if (!cardmarketJson) {
      setMappingStatus(status, 'CardMarket JSON path is required.', true)
      return
    }

    if (!type) {
      setMappingStatus(status, 'Select a variant type first.', true)
      return
    }

    const stamp = stampsRaw
      .split(',')
      .map((value) => value.trim())
      .filter(Boolean)

    const variant = {
      type,
      ...(foil ? { foil } : {}),
      ...(size ? { size } : {}),
      ...(stamp.length ? { stamp } : {}),
    }

    button.disabled = true
    setMappingStatus(status, 'Saving…')

    try {
      const res = await fetch('/api/cardmarket-map', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          cardmarketJson,
          cardmarketMap: cardmarketMap || undefined,
          cardId,
          productId,
          variant,
        }),
      })

      const data = await res.json()

      if (!res.ok) {
        throw new Error(data.error ?? data.message ?? 'Failed to save mapping')
      }

      if (data.mappingPath && !cardmarketMapInput.value.trim()) {
        cardmarketMapInput.value = data.mappingPath
        localStorage.setItem('cardmarketMap', data.mappingPath)
        document.getElementById('cardmarket-map-clear').hidden = false
      }

      mappingsChangedSinceLastRun = true
      staleBadge.style.display = ''
      setMappingStatus(status, 'Saved. Run dry-run to refresh counts.', false)
      updateMappingRowAfterSave(row, variant)
    } catch (error) {
      setMappingStatus(status, error instanceof Error ? error.message : String(error), true)
    } finally {
      button.disabled = false
    }
  }

  async function clearCardmarketMapping(button) {
    const row = button.closest('.mapping-row')
    const status = row.querySelector('[data-status]')

    const cardmarketJson = cardmarketJsonInput.value.trim()
    const cardmarketMap = cardmarketMapInput.value.trim()
    const cardId = row.dataset.cardId
    const productId = Number(row.dataset.productId)

    if (!cardmarketJson) {
      setMappingStatus(status, 'CardMarket JSON path is required.', true)
      return
    }

    button.disabled = true
    setMappingStatus(status, 'Clearing…')

    try {
      const res = await fetch('/api/cardmarket-map', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          cardmarketJson,
          cardmarketMap: cardmarketMap || undefined,
          cardId,
          productId,
          variant: null,
        }),
      })

      const data = await res.json()

      if (!res.ok) {
        throw new Error(data.error ?? data.message ?? 'Failed to clear mapping')
      }

      row.querySelector('.cm-type').value = ''
      row.querySelector('.cm-foil').value = ''
      row.querySelector('.cm-size').value = ''
      row.querySelector('.cm-stamps').value = ''

      mappingsChangedSinceLastRun = true
      staleBadge.style.display = ''
      setMappingStatus(status, 'Cleared. Run dry-run to refresh counts.', false)
      updateMappingRowAfterClear(row)
    } catch (error) {
      setMappingStatus(status, error instanceof Error ? error.message : String(error), true)
    } finally {
      button.disabled = false
    }
  }

  function updateMappingRowAfterSave(row, variant) {
    const mappedLine = row.querySelector('[data-mapped-line]')

    if (mappedLine) {
      mappedLine.textContent = `Mapped: ${buildClientVariantKey(variant)}`
    }

    row.dataset.mapped = 'true'
  }

  function updateMappingRowAfterClear(row) {
    const mappedLine = row.querySelector('[data-mapped-line]')

    if (mappedLine) {
      mappedLine.textContent = 'Not mapped'
    }

    row.dataset.mapped = 'false'
  }

  function buildClientVariantKey(variant) {
    const parts = [`type:${variant.type}`]

    if (variant.foil) {
      parts.push(`foil:${variant.foil}`)
    }

    if (variant.size && variant.size !== 'standard') {
      parts.push(`size:${variant.size}`)
    }

    if (Array.isArray(variant.stamp) && variant.stamp.length > 0) {
      parts.push(`stamp:${variant.stamp.slice().sort().join('+')}`)
    }

    return parts.join('|')
  }

  async function toggleBaseOverride(badge) {
    const cardmarketJson = cardmarketJsonInput.value.trim()
    const cardmarketMap = cardmarketMapInput.value.trim()
    const cardId = badge.dataset.cardId
    const productId = Number(badge.dataset.productId)
    const isCurrentlyBase = badge.dataset.isBase === 'true'

    if (!cardmarketJson) {
      alert('CardMarket JSON path is required.')
      return
    }

    badge.style.opacity = '0.5'
    badge.style.pointerEvents = 'none'

    try {
      const body = isCurrentlyBase
        ? { cardmarketJson, cardmarketMap: cardmarketMap || undefined, cardId, productId, clearBase: true }
        : { cardmarketJson, cardmarketMap: cardmarketMap || undefined, cardId, productId, setBase: true }

      const res = await fetch('/api/cardmarket-map', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      })

      const data = await res.json()

      if (!res.ok) {
        throw new Error(data.error ?? data.message ?? 'Failed')
      }

      if (data.mappingPath && !cardmarketMapInput.value.trim()) {
        cardmarketMapInput.value = data.mappingPath
        localStorage.setItem('cardmarketMap', data.mappingPath)
        document.getElementById('cardmarket-map-clear').hidden = false
      }

      mappingsChangedSinceLastRun = true
      staleBadge.style.display = ''

      /**
       * Update all badges in this mapping editor block.
       *
       * Find the surrounding mapping editor so we can update all rows:
       * - The clicked row becomes the new base (or cleared if unsetting)
       * - All other rows become non-base
       */
      const editor = badge.closest('.mapping-editor')
      const allBadges = editor ? editor.querySelectorAll('.base-badge') : []

      for (const b of allBadges) {
        const bId = Number(b.dataset.productId)
        const isNewBase = !isCurrentlyBase && bId === productId

        b.className = `base-badge ${isNewBase ? 'is-base' : 'not-base'}`
        b.dataset.isBase = String(isNewBase)
        b.title = isNewBase
          ? 'This is the auto-mapped base product. Click to unset.'
          : 'Set this product as the auto-mapped base.'
        b.textContent = isNewBase ? '★ base' : '☆ set base'
      }
    } catch (error) {
      alert(error instanceof Error ? error.message : String(error))
    } finally {
      badge.style.opacity = ''
      badge.style.pointerEvents = ''
    }
  }

  function setMappingStatus(el, message, isError = false) {
    if (!el) return

    el.textContent = message
    el.className = `mapping-status ${isError ? 'error' : 'ok'}`
  }

  function renderPresetOptions() {
    const presets = [
      ['', 'Preset…'],
      ['normal', 'Normal'],
      ['holo', 'Holo'],
      ['reverse', 'Reverse'],
      ['cosmos-holo', 'Cosmos Holo'],
      ['cosmos-reverse', 'Reverse Cosmos'],
      ['set-logo-stamp', 'Set-Logo Stamp'],
      ['pokeball-reverse', 'Poké Ball Reverse'],
      ['masterball-reverse', 'Master Ball Reverse'],
      ['jumbo-holo', 'Jumbo Holo'],
    ]

    return presets.map(([value, label]) => {
      return `<option value="${escapeAttr(value)}">${escapeHtml(label)}</option>`
    }).join('')
  }

  const PRESETS = {
    'normal':              { type: 'normal',   foil: '',          size: '',      stamps: '' },
    'holo':                { type: 'holo',     foil: '',          size: '',      stamps: '' },
    'reverse':             { type: 'reverse',  foil: '',          size: '',      stamps: '' },
    'cosmos-holo':         { type: 'holo',     foil: 'cosmos',    size: '',      stamps: '' },
    'cosmos-reverse':      { type: 'reverse',  foil: 'cosmos',    size: '',      stamps: '' },
    'set-logo-stamp':      { type: 'normal',   foil: '',          size: '',      stamps: 'set-logo' },
    'pokeball-reverse':    { type: 'reverse',  foil: 'pokeball',  size: '',      stamps: '' },
    'masterball-reverse':  { type: 'reverse',  foil: 'masterball',size: '',      stamps: '' },
    'jumbo-holo':          { type: 'holo',     foil: '',          size: 'jumbo', stamps: '' },
  }

  function applyMappingPreset(select) {
    const preset = PRESETS[select.value]
    if (!preset) return

    const row = select.closest('.mapping-row')
    row.querySelector('.cm-type').value = preset.type
    row.querySelector('.cm-foil').value = preset.foil
    row.querySelector('.cm-size').value = preset.size
    row.querySelector('.cm-stamps').value = preset.stamps

    select.value = ''
  }

  function setCardFilter(filter, btn) {
    document.querySelectorAll('.filter-btn').forEach((b) => {
      b.classList.toggle('active', b === btn)
    })

    const cards = reportPanel.querySelectorAll('details[data-cm-needs-mapping]')

    for (const card of cards) {
      if (filter === 'needs-mapping') {
        card.hidden = card.dataset.cmNeedsMapping !== 'true'
      } else {
        card.hidden = false
      }
    }
  }

  function normaliseSkus(skus) {
    if (!skus || typeof skus !== 'object') return []

    return Object.entries(skus).sort(([a], [b]) => {
      return String(a).localeCompare(String(b), undefined, { numeric: true })
    })
  }

  function getCardTraderFinishes(product) {
    const finishes = new Set()

    for (const entry of product.cardtrader ?? []) {
      for (const finish of entry.finishes ?? []) {
        if (finish) finishes.add(String(finish))
      }
    }

    return Array.from(finishes).sort()
  }

  function detectProductVariants(product, skus, cardTraderFinishes) {
    const values = new Set()

    for (const [, sku] of skus) {
      const variation = getSkuVariationText(sku)

      if (variation) values.add(variation)
    }

    for (const finish of cardTraderFinishes) {
      values.add(finish)
    }

    const productName = product.name ?? ''
    const cleanName = product.clean_name ?? ''
    const nameVariant = detectVariantFromText(`${productName} ${cleanName}`)

    if (nameVariant) values.add(nameVariant)

    return Array.from(values).sort()
  }

  function getSkuVariationText(sku) {
    return firstString([
      sku.var,
      sku.variant,
      sku.printing,
      sku.type,
      sku.finish,
      sku.subtype,
      sku.name,
    ])
  }

  function getSkuCondition(sku) {
    return firstString([
      sku.cnd,
      sku.condition,
      sku.conditionName,
    ])
  }

  function getSkuLanguage(sku) {
    return firstString([
      sku.lng,
      sku.language,
      sku.languageName,
    ])
  }

  function getSkuPrice(sku, keys) {
    for (const key of keys) {
      const value = sku[key]

      if (typeof value === 'number') {
        return value.toFixed(2)
      }

      if (typeof value === 'string' && value.trim()) {
        return value
      }
    }

    return null
  }

  function firstString(values) {
    for (const value of values) {
      if (typeof value === 'string' && value.trim()) {
        return value.trim()
      }
    }

    return ''
  }

  function detectVariantFromText(value) {
    const text = String(value).toLowerCase()

    if (text.includes('master ball') || text.includes('masterball')) return 'Master Ball'
    if (text.includes('poke ball') || text.includes('pokeball') || text.includes('poké ball')) return 'Poké Ball'
    if (text.includes('cosmos')) return 'Cosmos Holo'
    if (text.includes('reverse holo') || text.includes('reverse foil') || text.includes('reverse')) return 'Reverse Holo'
    if (text.includes('holofoil') || text.includes('holo foil') || text.includes('holo')) return 'Holo'
    if (text.includes('normal')) return 'Normal'

    return ''
  }

  function countReportSkus(report) {
    const products = [
      ...(report.matched ?? []).flatMap((item) => item.products ?? []),
      ...(report.ambiguous ?? []).flatMap((item) => item.products ?? []),
      ...(report.orphanProducts ?? []).map((item) => item.product).filter(Boolean),
    ]

    return countProductsSkus(products)
  }

  function countProductsSkus(products) {
    return products.reduce((total, product) => {
      return total + normaliseSkus(product.skus).length
    }, 0)
  }

  function filename(filePath) {
    return String(filePath ?? '').split(/[\\/]/).at(-1) ?? String(filePath ?? '')
  }

  async function saveIdMapEntry(cardKey, productId, btn) {
    const label = btn.querySelector('.copy-label')
    if (label) label.textContent = '…'

    try {
      const res = await fetch('/api/tcgplayer-id-map', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mapPath: tcgplayerIdMapInput.value.trim() || undefined,
          set: selectedSet,
          cardKey,
          productId,
        }),
      })

      if (!res.ok) throw new Error(await res.text())

      const { mapPath } = await res.json()

      if (!tcgplayerIdMapInput.value.trim()) {
        tcgplayerIdMapInput.value = mapPath
        localStorage.setItem('tcgplayerIdMap', mapPath)
        document.getElementById('tcgplayer-id-map-clear').hidden = false
      }

      if (label) {
        label.textContent = 'saved!'
        setTimeout(() => { label.textContent = 'save' }, 1500)
      }
    } catch (err) {
      const msg = err instanceof Error ? err.message : String(err)
      if (label) {
        label.textContent = `error: ${msg}`
        label.classList.add('error')
      }
      console.error('saveIdMapEntry:', err)
    } finally {
      if (label && label.textContent === '…') label.textContent = 'save'
    }
  }

  function renderIdMapManualEntry(cardKey) {
    const uid = `id-map-manual-${cardKey.replace(/[^a-z0-9]/gi, '-')}-${Math.random().toString(36).slice(2, 7)}`
    return `
      <div class="id-map-manual">
        <code class="id-map-manual-key">"${escapeHtml(cardKey)}":</code>
        <input type="number" class="id-map-manual-input" id="${uid}" placeholder="product ID" min="1" step="1"
          onkeydown="if(event.key==='Enter') document.getElementById('${uid}-btn').click()">
        <button class="btn-id-map-copy-manual" id="${uid}-btn" onclick="saveIdMapManual(${escapeHtml(JSON.stringify(cardKey))}, '${uid}', this)">
          <span class="copy-label">save</span>
        </button>
      </div>
    `
  }

  async function saveIdMapManual(cardKey, inputId, btn) {
    const input = document.getElementById(inputId)
    const id = parseInt(input?.value ?? '', 10)
    if (!id || isNaN(id)) { input?.focus(); return }
    await saveIdMapEntry(cardKey, id, btn)
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;')
  }

  function escapeAttr(value) {
    return escapeHtml(value).replaceAll('`', '&#096;')
  }
</script>
</body>
